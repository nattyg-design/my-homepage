<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Homepage</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Theme toggle switch -->
    <div class="theme-switch-container">
      <label class="theme-switch">
        <input type="checkbox" id="theme-toggle" />
        <span class="toggle-slider"></span>
      </label>
    </div>

    <!-- Floating bubbles -->
    <div class="bubbles">
      <span class="bubble"></span>
      <span class="bubble"></span>
      <span class="bubble"></span>
      <span class="bubble"></span>
      <span class="bubble"></span>
      <span class="bubble"></span>
      <span class="bubble"></span>
      <span class="bubble"></span>
      <span class="bubble"></span>
      <span class="bubble"></span>
      <span class="bubble"></span>
      <span class="bubble"></span>
      <span class="bubble"></span>
      <span class="bubble"></span>
      <span class="bubble"></span>
      <span class="bubble"></span>
      <span class="bubble"></span>
      <span class="bubble"></span>
    </div>

    <main class="card">
      <div class="hero-top">
        <img
          class="profile-photo"
          src="profile.png"
          alt="Natalia Gorelova"
        />

        <div class="hero-meta">
          <h1>Hello World</h1>
          <p class="intro">Welcome to my homepage.</p>
          <button type="button" class="contact-btn">
            <span class="contact-btn__icon" aria-hidden="true">🌸</span>
            <span>Contact Me</span>
            <span class="contact-btn__icon" aria-hidden="true">🌸</span>
          </button>
        </div>
      </div>

      <div id="weather-widget" class="weather-widget">
        <div class="weather-loading">
          <span class="loading-spinner"></span>
          <p>Loading weather data...</p>
        </div>
      </div>
    </main>

    <script>
    // Theme toggle
    (function () {
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      var savedTheme = localStorage.getItem('theme');
      var isDark = savedTheme ? savedTheme === 'dark' : prefersDark;
      
      var toggle = document.getElementById('theme-toggle');
      
      function applyTheme(dark) {
        if (dark) {
          document.documentElement.setAttribute('data-theme', 'dark');
          toggle.checked = true;
        } else {
          document.documentElement.removeAttribute('data-theme');
          toggle.checked = false;
        }
        localStorage.setItem('theme', dark ? 'dark' : 'light');
      }
      
      applyTheme(isDark);
      
      toggle.addEventListener('change', function () {
        applyTheme(toggle.checked);
      });
    })();
    
    // Bubble pop sound
    (function () {
      function playPopSound() {
        var audioContext = new (window.AudioContext || window.webkitAudioContext)();
        var now = audioContext.currentTime;
        var gainNode = audioContext.createGain();
        gainNode.connect(audioContext.destination);

        // High-pitched pop (primary tone)
        var osc1 = audioContext.createOscillator();
        osc1.type = 'sine';
        osc1.connect(gainNode);
        osc1.start(now);
        osc1.stop(now + 0.15);

        // Fast pitch bend from high to mid
        osc1.frequency.setValueAtTime(900, now);
        osc1.frequency.exponentialRampToValueAtTime(400, now + 0.15);

        // Envelope: quick attack, gentle decay
        gainNode.gain.setValueAtTime(0.35, now);
        gainNode.gain.exponentialRampToValueAtTime(0.05, now + 0.12);
        gainNode.gain.linearRampToValueAtTime(0, now + 0.15);
      }

      var bubbles = document.querySelectorAll('.bubble');
      bubbles.forEach(function (bubble) {
        bubble.addEventListener('click', function (e) {
          e.stopPropagation();
          if (bubble.classList.contains('bubble--popped')) return;

          bubble.classList.add('bubble--popped');
          playPopSound();

          setTimeout(function () {
            bubble.style.display = 'none';
          }, 400);
        });
      });
    })();
    </script>

    <script src="weather-widget.js"></script>
  </body>
</html>
