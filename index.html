<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Homepage</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Floating bubbles -->
    <div class="bubbles" aria-hidden="true">
      <span class="bubble"></span>
      <span class="bubble"></span>
      <span class="bubble"></span>
      <span class="bubble"></span>
      <span class="bubble"></span>
      <span class="bubble"></span>
      <span class="bubble"></span>
      <span class="bubble"></span>
      <span class="bubble"></span>
      <span class="bubble"></span>
      <span class="bubble"></span>
      <span class="bubble"></span>
    </div>

    <main class="card">
      <h1>Hello World</h1>
      <p class="intro">Welcome to my homepage.</p>

      <img
        class="profile-photo"
        src="profile.png"
        alt="Natalia Gorelova"
      />

      <button type="button" class="contact-btn">Contact Me</button>

      <div id="weather-widget" class="weather-widget">
        <div class="weather-loading">
          <span class="loading-spinner"></span>
          <p>Loading weather data...</p>
        </div>
      </div>
    </main>

    <!-- Ladybug -->
    <div class="ladybug" aria-hidden="true">
      <svg viewBox="0 0 80 90" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <!-- Shell base: deep red with warm variation -->
          <radialGradient id="shellGrad" cx="0.42" cy="0.38" r="0.6">
            <stop offset="0%" stop-color="#e53e3e"/>
            <stop offset="30%" stop-color="#dc2626"/>
            <stop offset="60%" stop-color="#c52020"/>
            <stop offset="85%" stop-color="#9b1c1c"/>
            <stop offset="100%" stop-color="#7f1d1d"/>
          </radialGradient>
          <!-- Primary specular highlight -->
          <radialGradient id="shineMain" cx="0.32" cy="0.28" r="0.25">
            <stop offset="0%" stop-color="rgba(255,255,255,0.45)"/>
            <stop offset="60%" stop-color="rgba(255,255,255,0.1)"/>
            <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
          </radialGradient>
          <!-- Secondary rim light -->
          <radialGradient id="shineRim" cx="0.7" cy="0.25" r="0.2">
            <stop offset="0%" stop-color="rgba(255,220,200,0.2)"/>
            <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
          </radialGradient>
          <!-- Pronotum (thorax shield) gradient -->
          <radialGradient id="pronotumGrad" cx="0.5" cy="0.45" r="0.5">
            <stop offset="0%" stop-color="#2d2d3f"/>
            <stop offset="70%" stop-color="#1a1a2e"/>
            <stop offset="100%" stop-color="#111122"/>
          </radialGradient>
          <!-- Pronotum white marks -->
          <radialGradient id="pronotumMark" cx="0.5" cy="0.5" r="0.5">
            <stop offset="0%" stop-color="#f5f0e0"/>
            <stop offset="100%" stop-color="#e0d8c8" stop-opacity="0"/>
          </radialGradient>
          <!-- Head gradient -->
          <radialGradient id="headGrad" cx="0.5" cy="0.4" r="0.5">
            <stop offset="0%" stop-color="#2a2a3d"/>
            <stop offset="100%" stop-color="#111122"/>
          </radialGradient>
          <!-- Spot gradient (not flat black) -->
          <radialGradient id="spotGrad" cx="0.45" cy="0.4" r="0.5">
            <stop offset="0%" stop-color="#0a0a15"/>
            <stop offset="100%" stop-color="#1a1a2e"/>
          </radialGradient>
          <!-- Edge shadow under shell -->
          <linearGradient id="shellEdge" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="rgba(0,0,0,0)"/>
            <stop offset="100%" stop-color="rgba(0,0,0,0.15)"/>
          </linearGradient>
          <!-- Leg segment gradient -->
          <linearGradient id="legGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#1a1a2e"/>
            <stop offset="50%" stop-color="#2a2a40"/>
            <stop offset="100%" stop-color="#111122"/>
          </linearGradient>
        </defs>

        <!-- === LEGS (3 segments each, jointed) === -->
        <g class="lb-legs">
          <!-- Left front -->
          <path d="M26 38 Q20 34 17 30 Q14 26 10 23" stroke="url(#legGrad)" stroke-width="1.3" stroke-linecap="round" fill="none"/>
          <circle cx="10" cy="23" r="0.7" fill="#1a1a2e"/>
          <!-- Left mid -->
          <path d="M24 46 Q16 44 12 43 Q8 42 4 39" stroke="url(#legGrad)" stroke-width="1.3" stroke-linecap="round" fill="none"/>
          <circle cx="4" cy="39" r="0.7" fill="#1a1a2e"/>
          <!-- Left rear -->
          <path d="M26 54 Q20 56 16 58 Q12 61 8 65" stroke="url(#legGrad)" stroke-width="1.3" stroke-linecap="round" fill="none"/>
          <circle cx="8" cy="65" r="0.7" fill="#1a1a2e"/>

          <!-- Right front -->
          <path d="M54 38 Q60 34 63 30 Q66 26 70 23" stroke="url(#legGrad)" stroke-width="1.3" stroke-linecap="round" fill="none"/>
          <circle cx="70" cy="23" r="0.7" fill="#1a1a2e"/>
          <!-- Right mid -->
          <path d="M56 46 Q64 44 68 43 Q72 42 76 39" stroke="url(#legGrad)" stroke-width="1.3" stroke-linecap="round" fill="none"/>
          <circle cx="76" cy="39" r="0.7" fill="#1a1a2e"/>
          <!-- Right rear -->
          <path d="M54 54 Q60 56 64 58 Q68 61 72 65" stroke="url(#legGrad)" stroke-width="1.3" stroke-linecap="round" fill="none"/>
          <circle cx="72" cy="65" r="0.7" fill="#1a1a2e"/>
        </g>

        <!-- === BODY SHADOW (ground contact hint) === -->
        <ellipse cx="40" cy="68" rx="16" ry="3" fill="rgba(0,0,0,0.08)"/>

        <!-- === ELYTRA (wing covers) === -->
        <g class="lb-wings">
          <!-- Left elytron -->
          <path class="lb-wing lb-wing--left"
            d="M40 22 Q20 24 20 46 Q20 66 40 68 Z"
            fill="url(#shellGrad)" stroke="#7f1d1d" stroke-width="0.6"/>
          <!-- Left elytron edge shadow -->
          <path d="M40 22 Q20 24 20 46 Q20 66 40 68 Z"
            fill="url(#shellEdge)" opacity="0.4"/>

          <!-- Right elytron -->
          <path class="lb-wing lb-wing--right"
            d="M40 22 Q60 24 60 46 Q60 66 40 68 Z"
            fill="url(#shellGrad)" stroke="#7f1d1d" stroke-width="0.6"/>
        </g>

        <!-- Shell texturing — fine concentric lines -->
        <path d="M40 26 Q24 28 23 46 Q23 62 40 64" stroke="rgba(0,0,0,0.06)" stroke-width="0.4" fill="none"/>
        <path d="M40 26 Q56 28 57 46 Q57 62 40 64" stroke="rgba(0,0,0,0.06)" stroke-width="0.4" fill="none"/>
        <path d="M40 30 Q28 32 27 46 Q27 58 40 60" stroke="rgba(0,0,0,0.04)" stroke-width="0.3" fill="none"/>
        <path d="M40 30 Q52 32 53 46 Q53 58 40 60" stroke="rgba(0,0,0,0.04)" stroke-width="0.3" fill="none"/>

        <!-- Primary specular highlight -->
        <ellipse cx="33" cy="34" rx="7" ry="10" fill="url(#shineMain)"/>
        <!-- Secondary rim highlight -->
        <ellipse cx="52" cy="32" rx="4" ry="6" fill="url(#shineRim)"/>

        <!-- Suture line (center seam) -->
        <line x1="40" y1="22" x2="40" y2="68" stroke="#1a1a2e" stroke-width="1.2" opacity="0.5"/>
        <!-- Suture highlight -->
        <line x1="40.6" y1="23" x2="40.6" y2="67" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>

        <!-- === SPOTS (varying sizes, slight irregularity) === -->
        <!-- Row 1 -->
        <ellipse cx="31" cy="33" rx="3.5" ry="3.2" fill="url(#spotGrad)" transform="rotate(-5 31 33)"/>
        <ellipse cx="49" cy="33" rx="3.5" ry="3.2" fill="url(#spotGrad)" transform="rotate(5 49 33)"/>
        <!-- Row 2 -->
        <ellipse cx="28" cy="46" rx="3" ry="2.8" fill="url(#spotGrad)" transform="rotate(-8 28 46)"/>
        <ellipse cx="52" cy="46" rx="3" ry="2.8" fill="url(#spotGrad)" transform="rotate(8 52 46)"/>
        <!-- Row 3 (smaller, near rear) -->
        <ellipse cx="33" cy="57" rx="2.2" ry="2" fill="url(#spotGrad)" transform="rotate(-3 33 57)"/>
        <ellipse cx="47" cy="57" rx="2.2" ry="2" fill="url(#spotGrad)" transform="rotate(3 47 57)"/>
        <!-- Center spot (scutellar) -->
        <ellipse cx="40" cy="25" rx="2" ry="1.5" fill="url(#spotGrad)" opacity="0.7"/>

        <!-- === PRONOTUM (thorax shield) === -->
        <path d="M28 22 Q40 18 52 22 Q52 28 40 30 Q28 28 28 22Z" fill="url(#pronotumGrad)"/>
        <!-- White markings on pronotum -->
        <ellipse cx="33" cy="23" rx="2.5" ry="1.8" fill="url(#pronotumMark)" opacity="0.5" transform="rotate(-10 33 23)"/>
        <ellipse cx="47" cy="23" rx="2.5" ry="1.8" fill="url(#pronotumMark)" opacity="0.5" transform="rotate(10 47 23)"/>
        <!-- Pronotum shine -->
        <ellipse cx="38" cy="22" rx="3" ry="1.5" fill="rgba(255,255,255,0.12)"/>

        <!-- === HEAD === -->
        <ellipse cx="40" cy="16" rx="8" ry="6.5" fill="url(#headGrad)"/>
        <!-- Head texture -->
        <ellipse cx="40" cy="15" rx="5" ry="3" fill="rgba(255,255,255,0.06)"/>

        <!-- === EYES (compound, realistic) === -->
        <!-- Left eye -->
        <ellipse cx="34" cy="13" rx="3" ry="2.8" fill="#111"/>
        <ellipse cx="34" cy="13" rx="2.6" ry="2.4" fill="#1a1a1a"/>
        <ellipse cx="33.5" cy="12.5" rx="1.2" ry="0.9" fill="rgba(255,255,255,0.25)"/>
        <circle cx="33" cy="12" r="0.4" fill="rgba(255,255,255,0.5)"/>
        <!-- Right eye -->
        <ellipse cx="46" cy="13" rx="3" ry="2.8" fill="#111"/>
        <ellipse cx="46" cy="13" rx="2.6" ry="2.4" fill="#1a1a1a"/>
        <ellipse cx="45.5" cy="12.5" rx="1.2" ry="0.9" fill="rgba(255,255,255,0.25)"/>
        <circle cx="45" cy="12" r="0.4" fill="rgba(255,255,255,0.5)"/>

        <!-- === ANTENNAE (segmented, clubbed tips) === -->
        <path d="M34 11 Q30 6 27 3 Q25 1 23 0" stroke="#1a1a2e" stroke-width="0.9" stroke-linecap="round" fill="none"/>
        <path d="M46 11 Q50 6 53 3 Q55 1 57 0" stroke="#1a1a2e" stroke-width="0.9" stroke-linecap="round" fill="none"/>
        <!-- Antenna clubs -->
        <ellipse cx="23" cy="0" rx="1.8" ry="1.2" fill="#2a2a3d" transform="rotate(-30 23 0)"/>
        <ellipse cx="57" cy="0" rx="1.8" ry="1.2" fill="#2a2a3d" transform="rotate(30 57 0)"/>
        <!-- Antenna segments -->
        <circle cx="28" cy="5" r="0.5" fill="#2a2a3d" opacity="0.4"/>
        <circle cx="52" cy="5" r="0.5" fill="#2a2a3d" opacity="0.4"/>

        <!-- === MOUTHPARTS (tiny) === -->
        <path d="M38 19 Q40 21 42 19" stroke="#111" stroke-width="0.6" stroke-linecap="round" fill="none" opacity="0.4"/>
      </svg>
    </div>

    <script>
    (function () {
      var bug = document.querySelector('.ladybug');
      var perchTargets = ['.card h1', '.intro', '.contact-btn'];
      var FLIGHT_DURATION = 1800;
      var CRAWL_DURATION  = 2500;
      var CRAWL_DISTANCE  = 60;
      var CRUISE_DURATION = 2800;
      var lastTarget = -1;
      var currentX = -100, currentY = -100;
      var currentAngle = 0;

      if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
        bug.classList.add('ladybug--landed');
        bug.style.transform = 'translate(50vw, 30vh) scale(0.7)';
        return;
      }

      currentX = window.innerWidth + 50;
      currentY = window.innerHeight * 0.3;
      bug.style.transform = 'translate(' + currentX + 'px, ' + currentY + 'px)';
      bug.style.opacity = '1';

      function angleTo(x1, y1, x2, y2) {
        // Returns degrees. 0 = up, 90 = right, etc.
        return Math.atan2(x2 - x1, -(y2 - y1)) * (180 / Math.PI);
      }

      function getPerchPosition(selector) {
        var el = document.querySelector(selector);
        if (!el) return null;
        var rect = el.getBoundingClientRect();
        // Land on the text itself — center vertically, start from left side
        return {
          x: rect.left + rect.width * 0.2 + Math.random() * rect.width * 0.3,
          y: rect.top + rect.height * 0.3,
          crawlX: rect.left + rect.width * 0.6 + Math.random() * rect.width * 0.2
        };
      }

      function flyTo(x, y, duration, callback) {
        var angle = angleTo(currentX, currentY, x, y);
        currentAngle = angle;
        bug.style.transition = 'transform ' + duration + 'ms cubic-bezier(0.34, 1.05, 0.64, 1)';
        bug.style.transform = 'translate(' + x + 'px, ' + y + 'px) rotate(' + angle + 'deg)';
        currentX = x;
        currentY = y;
        setTimeout(callback, duration);
      }

      function crawlTo(x, y, duration, callback) {
        // Crawl is horizontal — angle = 90 (facing right) or -90 (facing left)
        var angle = x > currentX ? 90 : -90;
        currentAngle = angle;
        bug.style.transition = 'transform ' + duration + 'ms linear';
        bug.style.transform = 'translate(' + x + 'px, ' + y + 'px) rotate(' + angle + 'deg)';
        currentX = x;
        currentY = y;
        setTimeout(callback, duration);
      }

      function pickRandomTarget() {
        var idx;
        do {
          idx = Math.floor(Math.random() * perchTargets.length);
        } while (idx === lastTarget && perchTargets.length > 1);
        lastTarget = idx;
        return perchTargets[idx];
      }

      function cruise(callback) {
        var x = 80 + Math.random() * (window.innerWidth - 160);
        var y = 40 + Math.random() * (window.innerHeight * 0.5);
        bug.classList.remove('ladybug--landed', 'ladybug--crawling');
        bug.classList.add('ladybug--flying');
        flyTo(x, y, CRUISE_DURATION, callback);
      }

      function perch() {
        var selector = pickRandomTarget();
        var pos = getPerchPosition(selector);
        if (!pos) { cruise(perch); return; }

        bug.classList.remove('ladybug--landed', 'ladybug--crawling');
        bug.classList.add('ladybug--flying');

        // Fly to the landing spot on the text
        flyTo(pos.x, pos.y, FLIGHT_DURATION, function () {
          // Land
          bug.classList.remove('ladybug--flying');
          bug.classList.add('ladybug--landed', 'ladybug--crawling');

          // Crawl across the text
          crawlTo(pos.crawlX, pos.y, CRAWL_DURATION, function () {
            // Take off
            bug.classList.remove('ladybug--landed', 'ladybug--crawling');
            bug.classList.add('ladybug--flying');
            cruise(perch);
          });
        });
      }

      // Enter the scene
      setTimeout(function () {
        bug.classList.add('ladybug--flying');
        cruise(perch);
      }, 600);
    })();
    </script>

    <script src="weather-widget.js"></script>
  </body>
</html>
